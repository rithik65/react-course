<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>

    <style>

      body {
        font-family: Arial;
      }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px  20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .input-button {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }
      
      .chat-message-robot {
        display: flex;
        border-radius: 10px;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(238, 238,238);
        border-radius: 10px;
        padding: 15px 20px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      } 

      .chat-message-profile {
        width: 45px;
      }

    </style>

  </head>
  <body>
    <div class="js-container"></div>

    <script src="script.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({ chatMessage, setChatMessage}) {

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

       function sendMessages() {

        const response = Chatbot.getResponse(inputText);
        const newChatMessages = [
          ...chatMessage,
           {
            message: inputText,
            sender: 'user',
            id: crypto.randomUUID()
          },
          {
            message: response,
            sender: 'robot',
            id: crypto.randomUUID()
          }
        ]

        setChatMessage(newChatMessages);

      setInputText('');
    }

        return (
          <div className="chat-input-container">
            <input className="input-button"
              placeholder="Send a message to Chatbot" 
              size="30"
              onChange={saveInputText}
              value={inputText}
            />

            <button onClick ={sendMessages}  className = "send-button">Send</button>
          </div>
        );
      }

      function ChatMessage( {message, sender} ){
        // const message = props.message;
        // const sender = props.sender;
        // const { message, sender } = props;

        // if(sender === 'robot'){
        //   return (
        //     <div>
        //       <img src = "robot.png" width="50"/>
        //       {message}
        //     </div>
        //   );
        // }

        return (
          <div className={
            sender === 'user' 
              ? 'chat-message-user' 
              : 'chat-message-robot'
            }>

            {sender === 'robot' && (
              <img src = "robot.png" className="chat-message-profile"/>
            )}
            <div className="chat-message-text">
               {message}
            </div>
            {sender === 'user' && (
              <img src = "user.png" className="chat-message-profile"/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessage}){
        return (
         <>
            {chatMessage.map((chatMessage) => {
            return (
            <ChatMessage 
              message={chatMessage.message}
              sender = {chatMessage.sender}
              key = {chatMessage.id}
            />
            );
          })
        }
          </>
      );
    }

      function App(){

         const [chatMessage, setChatMessage] = React.useState([{
            message : 'hello chatbot',
            sender : 'user',
            id : 'id1'
        },
        {
            message : 'Hello! How can I help you?',
            sender : 'robot',
            id : 'id2'
        },
        {
            message : `get today's date`,
            sender :  'user',
            id : 'id3'
        },
        {
            message : 'Today is June 25',
            sender : 'robot',
            id : 'id4'
        }])
        //const [chatMessage, setChatMessage] = array;
        // const chatMessage = array[0];       // current data
        // const setChatMessage = array[1];    // updated data

        return (
          <div className="app-container">
            <ChatInput 
              chatMessage = {chatMessage}
              setChatMessage = {setChatMessage}
            
            />
            <ChatMessages 
              chatMessage = {chatMessage}
            />
          </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
